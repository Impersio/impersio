    <script>
      (function() {
        try {
          var theme = localStorage.getItem('impersio-theme');
          var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches) || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
    <style>
      :root {
        --bg-primary: #f9faf5;      
        --bg-secondary: #eff0eb;
        --surface: #FFFFFF;         
        --surface-hover: #f3f3f1;
        --text-primary: #191919;    
        --text-secondary: #6B6B6B;  
        --border: #e5e5e5;          
      }
      
      .dark {
        --bg-primary: #191919;      
        --bg-secondary: #191919;    
        --surface: #202020;         
        --surface-hover: #2A2A2A;
        --text-primary: #E8E8E6;    
        --text-secondary: #8E8E8E;  
        --border: #333333;
      }

      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        margin: 0;
        padding: 0;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border); 
        border-radius: 9999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-secondary); 
      }
      
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      ::selection {
        background: rgba(33, 128, 141, 0.2);
        color: var(--text-primary);
      }

      textarea::placeholder {
        color: #8D8D8D;
        opacity: 1;
        font-weight: 400;
      }
    </style>
