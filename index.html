<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <title>Impersio AI</title>
    <meta name="description" content="Impersio is an AI-powered answer engine that delivers fast, accurate, and cited answers to your questions. Search smarter with real-time web access and transparent sources." />
    <meta name="keywords" content="Impersio, Impersio AI, AI search, answer engine, Anubhav Sapkota, conversational search" />
    <meta name="author" content="Anubhav Sapkota" />
    <meta property="og:title" content="Impersio AI" />
    <meta property="og:description" content="Impersio is an AI-powered answer engine that delivers fast, accurate, and cited answers to your questions." />
    <meta property="og:type" content="website" />
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 100 100' fill='%2321808D' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M 25 25 Q 5 50 25 75 Q 15 50 25 25 Z'/%3E%3Cpath fill-rule='evenodd' d='M 45 15 Q 15 50 45 85 Q 75 50 45 15 Z M 45 25 Q 30 50 45 75 Q 68 50 45 25 Z'/%3E%3Cpath fill-rule='evenodd' d='M 75 20 Q 55 50 75 80 Q 95 50 75 20 Z M 75 28 Q 65 50 75 72 Q 90 50 75 28 Z'/%3E%3Ccircle cx='92' cy='50' r='4'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('impersio-theme');
          var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches) || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
    <style>
      :root {
        --bg-primary: #f9faf5;      
        --bg-secondary: #eff0eb;
        --surface: #FFFFFF;         
        --surface-hover: #f3f3f1;
        --text-primary: #191919;    
        --text-secondary: #6B6B6B;  
        --border: #e5e5e5;          
      }
      
      .dark {
        --bg-primary: #191919;      
        --bg-secondary: #191919;    
        --surface: #202020;         
        --surface-hover: #2A2A2A;
        --text-primary: #E8E8E6;    
        --text-secondary: #8E8E8E;  
        --border: #333333;
      }

      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        margin: 0;
        padding: 0;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border); 
        border-radius: 9999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-secondary); 
      }
      
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      ::selection {
        background: rgba(33, 128, 141, 0.2);
        color: var(--text-primary);
      }

      textarea::placeholder {
        color: #8D8D8D;
        opacity: 1;
        font-weight: 400;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
