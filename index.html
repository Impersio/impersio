<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <title>Impersio</title>
    <meta name="description" content="Where knowledge begins." />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='%2321808D' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 2L2 7l10 5 10-5-10-5z'/%3E%3Cpath d='M2 17l10 5 10-5'/%3E%3Cpath d='M2 12l10 5 10-5'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
              serif: ['"Plus Jakarta Sans"', 'sans-serif'], // Override serif to use Sans too
              mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
            },
            colors: {
              background: 'var(--bg-primary)', 
              sidebar: 'var(--bg-secondary)',
              surface: 'var(--surface)',    
              'surface-hover': 'var(--surface-hover)', 
              border: 'var(--border)',     
              primary: 'var(--text-primary)',    
              muted: 'var(--text-secondary)',      
              'scira-accent': '#1c7483', 
              'scira-accent-hover': '#165f6b',
            },
            animation: {
              'spin-slow': 'spin 3s linear infinite',
              'fade-in': 'fadeIn 0.3s ease-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(4px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            },
            boxShadow: {
              'elegant': '0 2px 8px rgba(0,0,0,0.04), 0 0 1px rgba(0,0,0,0.1)',
              'glow': '0 0 20px rgba(33, 128, 141, 0.15)',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --bg-primary: #fcfcf9;      
        --bg-secondary: #fcfcf9;
        --surface: #FFFFFF;         
        --surface-hover: #f3f3f1;
        --text-primary: #191919;    
        --text-secondary: #6B6B6B;  
        --border: #e5e5e5;          
      }
      
      .dark {
        --bg-primary: #191919;      
        --bg-secondary: #191919;    
        --surface: #202020;         
        --surface-hover: #2A2A2A;
        --text-primary: #E8E8E6;    
        --text-secondary: #8E8E8E;  
        --border: #333333;
      }

      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        font-family: 'Plus Jakarta Sans', sans-serif !important;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        margin: 0;
        padding: 0;
      }

      /* STRICTLY FORCE FONT ON EVERYTHING */
      *, input, textarea, button, select {
        font-family: 'Plus Jakarta Sans', sans-serif !important;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border); 
        border-radius: 9999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-secondary); 
      }
      
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      ::selection {
        background: rgba(33, 128, 141, 0.2);
        color: var(--text-primary);
      }

      textarea::placeholder {
        color: #8D8D8D;
        opacity: 1;
        font-weight: 400;
      }
    </style>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
