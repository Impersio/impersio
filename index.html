
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <title>Impersio</title>
    <meta name="description" content="Impersio is a minimalist AI search engine." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='%231c7483' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z' /%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
              serif: ['"Instrument Serif"', 'Georgia', 'serif'],
            },
            colors: {
              background: 'var(--background)', 
              surface: 'var(--surface)',    
              'surface-hover': 'var(--surface-hover)',
              border: 'var(--border)',     
              primary: 'var(--primary)',    
              muted: 'var(--muted)',      
              'bubble-user': 'var(--bubble-user)',
              'scira-accent': '#2db6c7', // Brighter teal to match reference
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out',
              'slide-up': 'slideUp 0.4s ease-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(10px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* Light Mode */
        --background: #ffffff;                 
        --surface: #f3f3f3;                    
        --surface-hover: #e5e5e5;
        --border: #e5e5e5; 
        --primary: #171717;      
        --muted: #737373;  
        --bubble-user: #f3f4f6;                 
      }
      
      .dark {
        /* Exact Reference Dark Mode */
        --background: #191919; 
        --surface: #202020;    
        --surface-hover: #2f2f2f; 
        --border: #333333;     
        --primary: #e8e8e8;    
        --muted: #a3a3a3;      
        --bubble-user: #222222; 
      }

      body {
        background-color: var(--background);
        color: var(--primary);
        font-family: '"Plus Jakarta Sans"', sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      /* Thin, elegant scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border); 
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--muted); 
      }

      textarea::-webkit-scrollbar {
        display: none;
      }
      textarea {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      .markdown-body {
        line-height: 1.75; 
        font-size: 16px; 
        font-weight: 400;
        color: var(--primary);
      }
      
      .markdown-body h1, .markdown-body h2, .markdown-body h3 {
        color: var(--primary);
        font-weight: 600;
        letter-spacing: -0.01em;
        margin-top: 2rem;
        margin-bottom: 1rem;
      }
      
      .markdown-body a {
        color: var(--scira-accent);
        text-decoration: none;
        font-weight: 500;
      }
      .markdown-body a:hover {
        text-decoration: underline;
      }

      .markdown-body code {
        background-color: var(--surface-hover);
        padding: 0.2em 0.4em;
        border-radius: 4px;
        font-size: 0.85em;
        font-family: monospace;
      }

      .markdown-body pre {
        background-color: var(--surface-hover);
        padding: 1rem;
        border-radius: 0.5rem;
        overflow-x: auto;
        margin-bottom: 1.5rem;
        border: 1px solid var(--border);
      }
      
      ::selection {
        background: rgba(45, 182, 199, 0.3);
        color: white;
      }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0",
    "remark-gfm": "https://esm.sh/remark-gfm@^4.0.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.90.1",
    "recharts": "https://esm.sh/recharts@^2.12.0",
    "pptxgenjs": "https://esm.sh/pptxgenjs@3.12.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
